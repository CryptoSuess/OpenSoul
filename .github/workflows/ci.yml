# Runs the headless smoke test on every pull request, so a regression in the
# core loop blocks the merge. Triggering on pull_request alone (not also push)
# avoids the classic double-run — a same-repo PR branch would otherwise fire
# both events. Use the manual trigger to run it on a branch without a PR.
name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: npm test
